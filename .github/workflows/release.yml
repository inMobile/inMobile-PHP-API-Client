name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, e.g. 4.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: curl, json
          tools: composer:v2

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION (must be semver: MAJOR.MINOR.PATCH)"
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Patch version in CurlClient.php for this build only
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          php -r '
          $file = "src/CurlClient.php";
          $contents = file_get_contents($file);

          $updated = preg_replace(
              "/Inmobile PHP Client v[0-9]+\\.[0-9]+\\.[0-9]+/",
              "Inmobile PHP Client v" . getenv("VERSION"),
              $contents,
              1,
              $count
          );

          if ($count !== 1) {
              fwrite(STDERR, "Failed to update version string\n");
              exit(1);
          }

          file_put_contents($file, $updated);
          '

      - name: Install dependencies
        run: composer install -n --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit --coverage-text

      - name: Create annotated tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git tag -a "v$VERSION" -m "Release v$VERSION"

      - name: Build release archive from patched workspace
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ARCHIVE="inMobile-PHP-API-Client-v${VERSION}.tar.gz"

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=vendor/bin/.phpunit \
            -czf "$ARCHIVE" .

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Push tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git push origin "v$VERSION"

      - name: Create GitHub release and upload artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "v$VERSION" "$ARCHIVE" \
            --title "v$VERSION" \
            --generate-notes \
            --verify-tag